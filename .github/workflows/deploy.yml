# .github/workflows/deploy.yml
name: Deploy Version API

on:
  pull_request:
    branches:
      - master
    types:
      - closed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Get version from .env
        id: version
        run: |
          VERSION=$(grep "VITE_APP_VERSION" .env | cut -d'=' -f2 | tr -d '[:space:]')
          echo "ver=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION (number)"

      - name: Update worker with number version
        run: |
          sed -i "s/VITE_APP_VERSION_PLACEHOLDER/${{ steps.version.outputs.ver }}/" worker.js
          echo "Updated worker.js with version number: ${{ steps.version.outputs.ver }}"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  server_deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        id: ssh_deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: ${{ secrets.SERVER_COMMAND }}

      - name: Send Notification
        if: steps.ssh_deploy.outcome == 'success'
        run: |
          # 使用 GitHub Actions 提供的环境变量
          hash=${GITHUB_SHA:0:7}  # 获取前7位的commit hash
          commit_message="${{ github.event.pull_request.body }}"
          # 自定义消息
          msg="#$hash - closureStudio 构建成功 \\n「${commit_message}」"
          msg=$(echo "$msg" | sed ':a;N;$!ba;s/\n/\\n/g')

          curl -X POST "${{ secrets.NOTIFY_API_URL }}" \
              -H "Content-Type: application/json" \
              -d '{
                    "token": "'"${{ secrets.NOTIFY_TOKEN }}"'",
                    "uid": "'"${{ secrets.NOTIFY_UID }}"'",
                    "msg": "'"$msg"'"
                  }'
